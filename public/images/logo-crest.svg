<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 540" role="img" aria-label="Productive Security Inc.">
  <title>Productive Security Inc.</title>
  <defs>
    <filter id="pop" x="-25%" y="-18%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="b"/>
      <feOffset dy="14" result="o"/>
      <feFlood flood-color="#050814" flood-opacity="0.5"/>
      <feComposite in2="o" operator="in" result="s"/>
      <feMerge>
        <feMergeNode in="s"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5488"/>
      <stop offset="45%" stop-color="#1c2448"/>
      <stop offset="100%" stop-color="#3a4478"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f04448"/>
      <stop offset="55%" stop-color="#d32025"/>
      <stop offset="100%" stop-color="#9e1418"/>
    </linearGradient>
    <radialGradient id="gold" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f3d68a"/>
      <stop offset="50%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#8f6820"/>
    </radialGradient>
  </defs>

  <g filter="url(#pop)">
